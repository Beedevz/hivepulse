basePath: /api/v1
definitions:
  domain.AssignmentTriggers:
    properties:
      cooldown_minutes:
        description: 0 = disabled
        type: integer
      schedule:
        $ref: '#/definitions/domain.ScheduleRule'
    type: object
  domain.DownPeriod:
    properties:
      resolved_at:
        type: string
      started_at:
        type: string
    type: object
  domain.GeneralSettings:
    properties:
      timezone:
        description: IANA timezone, e.g. "Europe/Istanbul"
        type: string
    type: object
  domain.OverviewStats:
    properties:
      avg_ping_ms:
        type: integer
      buckets:
        items:
          $ref: '#/definitions/domain.StatsBucket'
        type: array
    type: object
  domain.ScheduleRule:
    properties:
      days:
        description: e.g. ["mon","tue","wed","thu","fri"]
        items:
          type: string
        type: array
      end:
        description: '"HH:MM" 24-hour'
        type: string
      start:
        description: '"HH:MM" 24-hour'
        type: string
    type: object
  domain.StatsBucket:
    properties:
      avg_ping_ms:
        type: integer
      time:
        type: string
      total_count:
        type: integer
      up_count:
        type: integer
    type: object
  domain.StatsResponse:
    properties:
      avg_ping_ms:
        type: integer
      buckets:
        items:
          $ref: '#/definitions/domain.StatsBucket'
        type: array
      down_periods:
        items:
          $ref: '#/definitions/domain.DownPeriod'
        type: array
      uptime_pct:
        type: number
    type: object
  handler.incidentListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/handler.incidentResponse'
        type: array
      total:
        type: integer
    type: object
  handler.incidentResponse:
    properties:
      duration_s:
        type: integer
      error_msg:
        type: string
      id:
        type: integer
      monitor_id:
        type: string
      monitor_name:
        type: string
      resolved_at:
        type: string
      started_at:
        type: string
    type: object
  handler.logResponse:
    properties:
      channel_id:
        type: string
      error_msg:
        type: string
      event:
        type: string
      id:
        type: integer
      monitor_id:
        type: string
      monitor_name:
        type: string
      sent_at:
        type: string
      status:
        type: string
    type: object
  handler.loginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  handler.monitorWriteRequest:
    properties:
      check_type:
        type: string
      dns_host:
        type: string
      dns_server:
        type: string
      enabled:
        type: boolean
      expected_keyword:
        type: string
      expected_status:
        type: integer
      expected_value:
        type: string
      follow_redirects:
        type: boolean
      host:
        type: string
      interval:
        type: integer
      method:
        type: string
      name:
        type: string
      packet_count:
        type: integer
      ping_host:
        type: string
      port:
        type: integer
      record_type:
        type: string
      request_body:
        type: string
      request_headers:
        type: string
      retries:
        type: integer
      retry_interval:
        type: integer
      skip_tls_verify:
        type: boolean
      timeout:
        type: integer
      url:
        type: string
    required:
    - check_type
    - interval
    - name
    type: object
  handler.setupRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        minLength: 8
        type: string
    required:
    - email
    - name
    - password
    type: object
  handler.smtpConfig:
    properties:
      from:
        type: string
      host:
        type: string
      password:
        type: string
      port:
        type: integer
      user:
        type: string
    type: object
  handler.statusPageResponse:
    properties:
      accent_color:
        type: string
      created_at:
        type: string
      custom_domain:
        type: string
      description:
        type: string
      id:
        type: string
      logo_url:
        type: string
      slug:
        type: string
      tag_ids:
        items:
          type: string
        type: array
      title:
        type: string
    type: object
  handler.statusPageWriteRequest:
    properties:
      accent_color:
        type: string
      custom_domain:
        type: string
      description:
        type: string
      logo_url:
        type: string
      slug:
        type: string
      tag_ids:
        items:
          type: string
        type: array
      title:
        type: string
    required:
    - title
    type: object
  handler.tagResponse:
    properties:
      color:
        type: string
      created_at:
        type: string
      id:
        type: string
      name:
        type: string
    type: object
  handler.tagWriteRequest:
    properties:
      color:
        type: string
      name:
        type: string
    required:
    - color
    - name
    type: object
info:
  contact: {}
  description: Open-source uptime monitoring platform
  title: HivePulse API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.loginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Login
      tags:
      - auth
  /auth/logout:
    post:
      responses:
        "204":
          description: No Content
      security:
      - Bearer: []
      summary: Logout
      tags:
      - auth
  /auth/me:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Get current user
      tags:
      - auth
  /auth/refresh:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Refresh access token
      tags:
      - auth
  /auth/setup:
    post:
      consumes:
      - application/json
      parameters:
      - description: Setup payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.setupRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create first admin (one-time)
      tags:
      - auth
  /auth/setup/status:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: boolean
            type: object
      summary: Check setup status
      tags:
      - auth
  /incidents:
    get:
      parameters:
      - default: all
        description: 'Filter: active|resolved|all'
        in: query
        name: status
        type: string
      - description: Search by monitor name (case-insensitive)
        in: query
        name: q
        type: string
      - default: 0
        description: Pagination offset
        in: query
        name: offset
        type: integer
      - default: 20
        description: Max results
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.incidentListResponse'
      security:
      - Bearer: []
      summary: List incidents
      tags:
      - incidents
  /monitors:
    get:
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Items per page
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: List monitors
      tags:
      - monitors
    post:
      consumes:
      - application/json
      parameters:
      - description: Monitor payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.monitorWriteRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Create monitor
      tags:
      - monitors
  /monitors/{id}:
    delete:
      parameters:
      - description: Monitor ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Delete monitor
      tags:
      - monitors
    get:
      parameters:
      - description: Monitor ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Get monitor by ID
      tags:
      - monitors
    put:
      consumes:
      - application/json
      parameters:
      - description: Monitor ID
        in: path
        name: id
        required: true
        type: string
      - description: Monitor payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.monitorWriteRequest'
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Update monitor
      tags:
      - monitors
  /monitors/{id}/channels/{channelId}/triggers:
    put:
      consumes:
      - application/json
      parameters:
      - description: Monitor ID
        in: path
        name: id
        required: true
        type: string
      - description: Channel ID
        in: path
        name: channelId
        required: true
        type: string
      - description: Trigger rules
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/domain.AssignmentTriggers'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Update trigger rules for a monitor-channel assignment
      tags:
      - monitors
  /monitors/{id}/heartbeats:
    get:
      parameters:
      - description: Monitor ID
        in: path
        name: id
        required: true
        type: string
      - default: 48
        description: Number of heartbeats
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: List heartbeats for a monitor
      tags:
      - monitors
  /monitors/{id}/stats:
    get:
      parameters:
      - description: Monitor ID
        in: path
        name: id
        required: true
        type: string
      - description: 'Time range: 1h, 3h, 6h, 24h, 48h, 7d, 15d, 30d, or 90d'
        in: query
        name: range
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.StatsResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Get aggregated stats for a monitor
      tags:
      - monitors
  /monitors/{id}/tags:
    get:
      parameters:
      - description: Monitor ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - Bearer: []
      summary: Get tags for a monitor
      tags:
      - monitors
  /monitors/{id}/tags/{tagId}:
    delete:
      parameters:
      - description: Monitor ID
        in: path
        name: id
        required: true
        type: string
      - description: Tag ID
        in: path
        name: tagId
        required: true
        type: string
      responses:
        "204":
          description: No Content
      security:
      - Bearer: []
      summary: Remove a tag from a monitor
      tags:
      - monitors
    post:
      parameters:
      - description: Monitor ID
        in: path
        name: id
        required: true
        type: string
      - description: Tag ID
        in: path
        name: tagId
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Assign a tag to a monitor
      tags:
      - monitors
  /notification-channels/{id}/logs:
    get:
      parameters:
      - description: Channel ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              items:
                $ref: '#/definitions/handler.logResponse'
              type: array
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: List notification logs for a channel
      tags:
      - notification-channels
  /s/{slug}:
    get:
      parameters:
      - description: Slug
        in: path
        name: slug
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get public status page by slug
      tags:
      - status-pages
  /settings/general:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.GeneralSettings'
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Get general settings
      tags:
      - settings
    put:
      consumes:
      - application/json
      parameters:
      - description: General settings
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/domain.GeneralSettings'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Update general settings
      tags:
      - settings
  /settings/smtp:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.smtpConfig'
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Get SMTP settings
      tags:
      - settings
    put:
      consumes:
      - application/json
      parameters:
      - description: SMTP configuration
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.smtpConfig'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Update SMTP settings
      tags:
      - settings
  /stats/overview:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.OverviewStats'
      security:
      - Bearer: []
      summary: Global stats overview
      tags:
      - stats
  /status-pages:
    get:
      parameters:
      - default: 1
        description: Page
        in: query
        name: page
        type: integer
      - default: 20
        description: Limit
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - Bearer: []
      summary: List status pages
      tags:
      - status-pages
    post:
      consumes:
      - application/json
      parameters:
      - description: Status Page
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.statusPageWriteRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handler.statusPageResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Create a status page
      tags:
      - status-pages
  /status-pages/{id}:
    delete:
      parameters:
      - description: Status Page ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Delete a status page
      tags:
      - status-pages
    get:
      parameters:
      - description: Status Page ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.statusPageResponse'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Get status page by ID
      tags:
      - status-pages
    put:
      parameters:
      - description: Status Page ID
        in: path
        name: id
        required: true
        type: string
      - description: Status Page
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.statusPageWriteRequest'
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.statusPageResponse'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Update a status page
      tags:
      - status-pages
  /tags:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - Bearer: []
      summary: List all tags
      tags:
      - tags
    post:
      consumes:
      - application/json
      parameters:
      - description: Tag
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.tagWriteRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handler.tagResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Create a tag
      tags:
      - tags
  /tags/{id}:
    delete:
      parameters:
      - description: Tag ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Delete a tag
      tags:
      - tags
  /users:
    get:
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Items per page
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: List users (admin only)
      tags:
      - users
  /users/{id}:
    delete:
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Delete user (admin only)
      tags:
      - users
  /users/{id}/role:
    put:
      consumes:
      - application/json
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      - description: Role payload
        in: body
        name: body
        required: true
        schema:
          additionalProperties:
            type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
