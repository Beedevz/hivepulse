name: CI

on:
  push:
    branches: ["main", "develop", "feat/**", "fix/**", "chore/**"]
    paths-ignore:
      - "**.md"
      - ".github/dependabot.yml"
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "**.md"

jobs:
  # ── Go: build + lint + test + security ────────────────────────────
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hivepulse-api

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: hivepulse-api/go.mod
          cache-dependency-path: hivepulse-api/go.sum

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: go-coverage
          path: hivepulse-api/coverage.out

      - name: golangci-lint
        working-directory: hivepulse-api
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          golangci-lint run --timeout=5m

      - name: gosec — Go security scanner
        uses: securego/gosec@master
        with:
          args: "-exclude=G401,G501 -exclude-dir=adapters/testdata ./..."

      - name: Swagger diff check
        run: |
          go install github.com/swaggo/swag/cmd/swag@latest
          swag init --generalInfo cmd/server/main.go --output docs/
          git diff --exit-code docs/

  # ── Frontend: lint + test + build ─────────────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hivepulse-web

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: hivepulse-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test -- --run

      - name: Build
        run: npm run build
