name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  IMAGE: beedevztech/hivepulse

jobs:
  release:
    name: Build, Scan & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      security-events: write
      pull-requests: read

    steps:
      - name: Checkout (full history for changelog)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      # ── Tests (gate before publish) ───────────────────────────────
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Prepare web/dist for embed
        run: mkdir -p web/dist && touch web/dist/.keep

      - name: Run Go tests
        run: go test -race ./internal/... ./infrastructure/... ./web/...

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Run frontend tests
        working-directory: ui
        run: |
          npm ci
          npm run test -- --run

      # ── Changelog ─────────────────────────────────────────────────
      - name: Install git-cliff
        run: |
          VER=$(curl -s https://api.github.com/repos/orhun/git-cliff/releases/latest \
                | grep '"tag_name"' | head -1 | cut -d'"' -f4 | tr -d 'v')
          curl -sSfL \
            "https://github.com/orhun/git-cliff/releases/download/v${VER}/git-cliff-${VER}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C /tmp
          find /tmp -name 'git-cliff' -type f | head -1 | xargs -I{} install -m755 {} /usr/local/bin/git-cliff

      - name: Generate release notes
        id: changelog
        run: |
          git-cliff --config cliff.toml --latest --strip header --output RELEASE_NOTES.md
          {
            echo 'content<<EOF'
            cat RELEASE_NOTES.md
            echo EOF
          } >> "$GITHUB_OUTPUT"
        env:
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}

      # ── Docker build ──────────────────────────────────────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image locally (for scanning)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: ${{ env.IMAGE }}:${{ steps.version.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Security scan ─────────────────────────────────────────────
      - name: Trivy — vulnerability scan (gate)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE }}:${{ steps.version.outputs.VERSION }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Trivy — SARIF report
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          image-ref: ${{ env.IMAGE }}:${{ steps.version.outputs.VERSION }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"
          ignore-unfixed: true

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: trivy-results.sarif

      # ── SBOM ──────────────────────────────────────────────────────
      - name: Generate SBOM
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          syft ${{ env.IMAGE }}:${{ steps.version.outputs.VERSION }} -o spdx-json > sbom.spdx.json

      # ── Push to Docker Hub (multi-platform) ───────────────────────
      - name: Push to Docker Hub
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE }}:${{ steps.version.outputs.VERSION }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha

      # ── GitHub Release ────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ${{ steps.changelog.outputs.content }}

            ---

            ## Docker

            ```bash
            docker pull beedevztech/hivepulse:${{ steps.version.outputs.VERSION }}
            ```

            ## Docker Compose (self-hosted upgrade)

            ```bash
            curl -O https://raw.githubusercontent.com/Beedevz/hivepulse/${{ steps.version.outputs.VERSION }}/docker-compose.yml
            docker compose pull && docker compose up -d
            ```

            ## Helm (Kubernetes)

            ```bash
            helm repo add hivepulse https://beedevz.github.io/hivepulse
            helm repo update
            helm upgrade --install hivepulse hivepulse/hivepulse --version ${{ steps.version.outputs.VERSION }}
            ```
          files: |
            sbom.spdx.json
            RELEASE_NOTES.md
